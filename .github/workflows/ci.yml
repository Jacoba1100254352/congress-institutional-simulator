name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Java tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run simulator tests
        run: make test
