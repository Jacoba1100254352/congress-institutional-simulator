name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests, calibration, and PDF freshness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install PDF check dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Run simulator CI
        run: make github-ci
